# InfraGuard AI - Flutter Mobile App

name: infraguard_ai
description: "Ghana's Unified Infrastructure Intelligence Platform - 100% Free Forever"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ^3.24.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  glassmorphism_ui: ^0.3.0

  # Navigation
  go_router: ^14.3.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Backend & Auth
  supabase_flutter: ^2.7.0

  # Maps
  google_maps_flutter: ^2.9.0

  # Database (Offline)
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.4

  # AI/ML
  tflite_flutter: ^0.10.4
  image: ^4.2.0
  camera: ^0.11.0+2

  # Notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

  # Charts
  fl_chart: ^0.69.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  connectivity_plus: ^6.0.5
  share_plus: ^10.0.3
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  geolocator: ^13.0.1
  speech_to_text: ^7.0.0
  pdf: ^3.11.1
  printing: ^5.13.2

  # JSON
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  json_serializable: ^6.8.0
  freezed: ^2.5.7
  riverpod_generator: ^2.4.3
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
